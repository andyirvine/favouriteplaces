{% extends "base.html" %}

{% block title %}Map — Our Favourite Places{% endblock %}

{% block head %}
<style>
  main { padding: 0; }
  footer { display: none; }
</style>
{% endblock %}

{% block content %}
<div class="map-layout">

  <!-- Side panel -->
  <div class="map-panel" id="map-panel">
    <div class="map-panel-header">
      <h2>All Places</h2>
      <p class="map-panel-count"><span id="map-count">0</span> places on the map</p>
    </div>
    <div class="map-panel-list" id="map-list">
      <div class="loading-state">Loading places…</div>
    </div>
  </div>

  <!-- Map -->
  <div id="map" class="full-map"></div>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/map_page.js') }}"></script>
{% endblock %}
