databases:
  - name: favouriteplaces-db
    databaseName: favouriteplaces
    user: favouriteplaces
    plan: free

services:
  - type: web
    name: favouriteplaces
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python seed_data.py && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: favouriteplaces-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FLASK_ENV
        value: production
